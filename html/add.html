<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>書籍追加・データ検索 - Book Manager</title>
	<link rel="stylesheet" href="../css/style.css">
</head>

<body>
	<div class="container">
		<h1>書籍取得と追加</h1>

		<nav>
			<a href="index.html">トップ</a>
			<a href="search.html">蔵書検索</a>
			<a href="settings.html">設定</a>
		</nav>

		<div class="card">
			<form method="POST" action="../cgi-bin/add.cgi">
				<div class="form-group">
					<label for="isbn">ISBN</label>
					<input type="text" id="isbn" name="isbn" required>
				</div>

				<div class="form-group">
					<span>CSVファイルに追加する</span>
					<label class="toggle-switch">
						<input type="checkbox" name="add_to_csv" value="yes" checked>
						<span class="toggle-slider"></span>
					</label>
					<br>
					<small id="current_csv_file">対象ファイル: 読み込み中...</small>
				</div>

				<p>
					<input type="submit" value="実行">
				</p>
			</form>
		</div>

		<script src="../js/settings.js"></script>
		<script>
			loadCsvFilePath('current_csv_file', '対象ファイル: ', '設定の読み込みに失敗しました:');
		</script>
	</div>

</body>

</html>
