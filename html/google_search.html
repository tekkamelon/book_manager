<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>外部検索 - Book Manager</title>
	<link rel="stylesheet" href="../css/style.css">
</head>

<body>
	<div class="container">
		<h1>外部検索へ遷移</h1>

		<nav>
			<a href="index.html">トップ</a>
			<a href="search.html">蔵書検索</a>
			<a href="add.html">書籍追加・データ検索</a>
			<a href="settings.html">設定</a>
		</nav>

		<div class="card">
			<p>書籍情報が見つかりませんでした。</p>
			<p>ISBN: <strong id="isbn_display">読み込み中...</strong></p>
			<p>Google でこの ISBN を検索しますか?</p>

			<div class="button-group">
				<a id="google_search_link" href="#" class="button" target="_blank" rel="noopener noreferrer">
					Google で検索
				</a>
				<a href="add.html" class="button" style="background: var(--bg-secondary); color: var(--text-primary);">
					戻る
				</a>
			</div>
		</div>
	</div>

	<script>
		const params = new URLSearchParams(window.location.search);
		const isbn = params.get('isbn') || '';

		document.getElementById('isbn_display').textContent = isbn || '不明';

		if (isbn) {
			const encoded = encodeURIComponent(isbn);
			document.getElementById('google_search_link').href =
				'https://www.google.com/search?q=' + encoded;
		}
	</script>
</body>

</html>
