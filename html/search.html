<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>蔵書検索 - Book Manager</title>
	<link rel="stylesheet" href="../css/style.css">
</head>

<body>
	<div class="container">
		<h1>蔵書検索</h1>

		<nav>
			<a href="index.html">トップ</a>
			<a href="add.html">書籍追加・データ検索</a>
			<a href="settings.html">設定</a>
		</nav>

		<div class="card">
			<form method="POST" action="../cgi-bin/search.cgi">
				<div class="form-group">
					<label for="q">検索ワード</label>
					<input type="search" id="q" name="q" required>
				</div>
				<p>
					<small id="current_csv_file">対象ファイル: 読み込み中...</small>
				</p>

				<script src="../js/settings.js"></script>
				<script>
					loadCsvFilePath('current_csv_file', '対象ファイル: ', '設定の読み込みに失敗しました:');
				</script>
				<p>
					<input type="submit" value="検索">
				</p>
			</form>
		</div>
	</div>

</body>

</html>
